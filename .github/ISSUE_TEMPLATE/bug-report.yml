name: Bug report
description: Report a technical issue in the browser diagnostics toolkit
title: "bug: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the technical problem clearly.
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser
      description: Which browser and version are affected?
      placeholder: Chrome 145 / Safari 18 / Firefox 145
    validations:
      required: true
  - type: input
    id: device
    attributes:
      label: Device / OS
      description: Which device and operating system are involved?
      placeholder: macOS 15 / Windows 11 / Android 15
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Include browser, device, steps, and expected vs actual behavior.
    validations:
      required: true
  - type: textarea
    id: console-output
    attributes:
      label: Console output
      description: Paste any relevant Console output, stack traces, or browser warnings.
      render: shell
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: Explain the reusable technical impact on the toolkit.
    validations:
      required: true
