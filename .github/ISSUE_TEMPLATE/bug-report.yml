name: Bug report
description: Report a reproducible technical issue in the browser hardware diagnostics toolkit
title: "bug: concise summary"
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Use this form for non-sensitive technical bugs in the public toolkit.

        If the issue may be security-sensitive, especially around permissions or media APIs, please use `SECURITY.md` instead of opening a public issue.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the technical problem clearly and neutrally.
    validations:
      required: true
  - type: input
    id: affected-area
    attributes:
      label: Affected area
      description: Which diagnostic module or shared component is affected?
      placeholder: gamepad / keyboard / mouse / monitor / microphone / speakers / shared UI
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser
      description: Which browser and version are affected?
      placeholder: Chrome 145 / Safari 18 / Firefox 145
    validations:
      required: true
  - type: input
    id: device
    attributes:
      label: Device / OS
      description: Which device and operating system are involved?
      placeholder: macOS 15 / Windows 11 / Android 15
    validations:
      required: true
  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to reproduce
      description: List the exact steps needed to reproduce the issue.
    validations:
      required: true
  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected behavior
      description: Explain what should happen.
    validations:
      required: true
  - type: textarea
    id: actual-behavior
    attributes:
      label: Actual behavior
      description: Explain what happens instead.
    validations:
      required: true
  - type: textarea
    id: console-output
    attributes:
      label: Console output
      description: Paste any relevant Console output, stack traces, or browser warnings.
      render: shell
  - type: textarea
    id: scope
    attributes:
      label: Scope / impact
      description: Explain the reusable technical impact on the toolkit.
    validations:
      required: true
