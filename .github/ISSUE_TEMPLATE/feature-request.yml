name: Feature request
description: Propose a reusable improvement to the browser hardware diagnostics toolkit
title: "[scope]: concise action"
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Use this form for public, reusable improvements to the toolkit.

        Keep the request technical, neutral, and broadly useful. Private growth work, branded landing-page work, and production-only concerns should stay outside this repository.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the capability gap or technical opportunity in a few sentences.
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: Explain which modules, browser APIs, or shared primitives are in scope.
    validations:
      required: true
  - type: textarea
    id: why-this-matters
    attributes:
      label: Why this matters
      description: Explain why this belongs in the shared open-source toolkit.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the reusable toolkit capability you want to add.
    validations:
      required: true
  - type: textarea
    id: api-surface
    attributes:
      label: API surface
      description: Explain the proposed public API, primitives, or extension surface.
    validations:
      required: true
  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance criteria
      description: Define what would make the feature complete and technically reusable.
    validations:
      required: true
  - type: textarea
    id: non-goals
    attributes:
      label: Non-goals
      description: Clarify what should stay outside the open-source toolkit boundary.
